syntax = "proto3";

package byte.v.forge.contracts.workflow.v1;

import "byte/v/forge/contracts/common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.Contracts.Workflow.V1";
option go_package = "github.com/byte-v-forge/common-lib/gen/go/byte/v/forge/contracts/workflow/v1;workflowv1";
option java_multiple_files = true;
option java_outer_classname = "WorkflowProto";
option java_package = "com.bytevforge.contracts.workflow.v1";
option php_namespace = "ByteVForge\\Contracts\\Workflow\\V1";

enum WorkflowRuntimeStatus {
  WORKFLOW_RUNTIME_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUNTIME_AVAILABLE = 1;
  WORKFLOW_RUNTIME_DEGRADED = 2;
  WORKFLOW_RUNTIME_UNCONFIGURED = 3;
  WORKFLOW_RUNTIME_UNAVAILABLE = 4;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_PENDING = 1;
  WORKFLOW_RUN_RUNNING = 2;
  WORKFLOW_RUN_WAITING = 3;
  WORKFLOW_RUN_SUCCEEDED = 4;
  WORKFLOW_RUN_FAILED = 5;
  WORKFLOW_RUN_CANCELED = 6;
  WORKFLOW_RUN_SKIPPED = 7;
}

enum WorkflowGraphElementStatus {
  WORKFLOW_GRAPH_ELEMENT_STATUS_UNSPECIFIED = 0;
  WORKFLOW_GRAPH_ELEMENT_PENDING = 1;
  WORKFLOW_GRAPH_ELEMENT_RUNNING = 2;
  WORKFLOW_GRAPH_ELEMENT_SUCCEEDED = 3;
  WORKFLOW_GRAPH_ELEMENT_FAILED = 4;
  WORKFLOW_GRAPH_ELEMENT_SKIPPED = 5;
}

message WorkflowRuntimeSummary {
  WorkflowRuntimeStatus engine_status = 1;
  string engine_message = 2;
  WorkflowRuntimeStatus api_status = 3;
  string api_message = 4;
  bool api_configured = 5;
  string editor_url = 6;
  repeated WorkflowDefinition workflows = 7;
  repeated WorkflowExecution executions = 8;
  google.protobuf.Timestamp checked_at = 9;
  repeated WorkflowRunProjection runs = 10;
  WorkflowRuntimePageInfo runs_page_info = 11;
  WorkflowRuntimePageInfo executions_page_info = 12;
}

message WorkflowRuntimePageInfo {
  int32 page_size = 1;
  int32 item_count = 2;
  string next_page_token = 3;
}

message WorkflowDefinition {
  string id = 1;
  string name = 2;
  bool active = 3;
  google.protobuf.Timestamp updated_at = 4;
  repeated string tags = 5;
  repeated WorkflowGraphNode graph_nodes = 6;
  repeated WorkflowGraphEdge graph_edges = 7;
}

message WorkflowExecution {
  string id = 1;
  string workflow_id = 2;
  string workflow_name = 3;
  WorkflowRunStatus status = 4;
  string mode = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp stopped_at = 7;
  repeated WorkflowGraphNode graph_nodes = 8;
  repeated WorkflowGraphEdge graph_edges = 9;
}

message WorkflowGraphNode {
  string id = 1;
  string name = 2;
  string kind = 3;
  WorkflowGraphElementStatus status = 4;
  double x = 5;
  double y = 6;
  string type_version = 7;
  bool disabled = 8;
  google.protobuf.Timestamp started_at = 9;
  int64 duration_ms = 10;
  string error_message = 11;
  int32 iterations = 12;
}

message WorkflowGraphEdge {
  string id = 1;
  string source = 2;
  string target = 3;
  string label = 4;
  WorkflowGraphElementStatus status = 5;
}

message WorkflowRunProjection {
  string run_id = 1;
  string workflow_id = 2;
  string workflow_name = 3;
  string execution_id = 4;
  WorkflowRunStatus status = 5;
  string current_node_id = 6;
  string current_node_name = 7;
  string error_message = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp completed_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  repeated WorkflowGraphNode graph_nodes = 12;
  repeated WorkflowGraphEdge graph_edges = 13;
}

message WorkflowStepUpdateRequest {
  string run_id = 1;
  string workflow_id = 2;
  string workflow_name = 3;
  string execution_id = 4;
  string node_id = 5;
  string node_name = 6;
  WorkflowRunStatus status = 7;
  string error_message = 8;
  google.protobuf.Timestamp occurred_at = 9;
  byte.v.forge.contracts.common.v1.EventMetadata metadata = 10;
}

message WorkflowStepUpdateResponse {
  WorkflowRunProjection run = 1;
  bool duplicate = 2;
}

message GetWorkflowRuntimeSummaryRequest {
  int32 runs_page_size = 1;
  string runs_page_token = 2;
  int32 executions_page_size = 3;
  string executions_page_token = 4;
}

message GetWorkflowRuntimeSummaryResponse {
  WorkflowRuntimeSummary summary = 1;
}

message StreamWorkflowRuntimeStateRequest {}

message WorkflowRuntimeStateEvent {
  string event_type = 1;
  WorkflowRuntimeSummary summary = 2;
}

service WorkflowRuntimeService {
  rpc GetWorkflowRuntimeSummary(GetWorkflowRuntimeSummaryRequest) returns (GetWorkflowRuntimeSummaryResponse);
  rpc UpdateWorkflowStep(WorkflowStepUpdateRequest) returns (WorkflowStepUpdateResponse);
  rpc StreamWorkflowRuntimeState(StreamWorkflowRuntimeStateRequest) returns (stream WorkflowRuntimeStateEvent);
}
