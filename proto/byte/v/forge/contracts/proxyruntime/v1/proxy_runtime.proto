syntax = "proto3";

package byte.v.forge.contracts.proxyruntime.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/byte-v-forge/common-lib/gen/go/byte/v/forge/contracts/proxyruntime/v1;proxyruntimev1";

enum ProxyProtocol {
  PROXY_PROTOCOL_UNSPECIFIED = 0;
  PROXY_PROTOCOL_HTTP = 1;
  PROXY_PROTOCOL_SOCKS5 = 2;
}

enum ProxyCapability {
  PROXY_CAPABILITY_UNSPECIFIED = 0;
  PROXY_CAPABILITY_CHAINING = 1;
  PROXY_CAPABILITY_POOL_REFRESH = 2;
  PROXY_CAPABILITY_API_POOL = 3;
  PROXY_CAPABILITY_STICKY_SESSION = 4;
  PROXY_CAPABILITY_ACTIVE_SESSION_ROTATION = 5;
  PROXY_CAPABILITY_USERNAME_PARAMETER_SESSION = 6;
  PROXY_CAPABILITY_UNIFIED_EGRESS_GATEWAY = 7;
  PROXY_CAPABILITY_DYNAMIC_LEASE = 8;
  PROXY_CAPABILITY_SUBSCRIPTION_PROVIDER = 9;
}

enum ProxySessionMode {
  PROXY_SESSION_MODE_UNSPECIFIED = 0;
  PROXY_SESSION_MODE_ROTATING = 1;
  PROXY_SESSION_MODE_STICKY = 2;
}

enum ProxyUpstreamKind {
  PROXY_UPSTREAM_KIND_UNSPECIFIED = 0;
  PROXY_UPSTREAM_KIND_SIMPLE_PROXY = 1;
  PROXY_UPSTREAM_KIND_DYNAMIC_IP = 2;
  PROXY_UPSTREAM_KIND_PROXY_POOL = 3;
}

enum ProxySourceKind {
  PROXY_SOURCE_KIND_UNSPECIFIED = 0;
  PROXY_SOURCE_KIND_FIXED_PROXY = 1;
  PROXY_SOURCE_KIND_SUBSCRIPTION = 2;
  PROXY_SOURCE_KIND_API_POOL = 3;
  PROXY_SOURCE_KIND_DYNAMIC_IP = 4;
}

enum ProxySourceNodeStatus {
  PROXY_SOURCE_NODE_STATUS_UNSPECIFIED = 0;
  PROXY_SOURCE_NODE_STATUS_UNKNOWN = 1;
  PROXY_SOURCE_NODE_STATUS_AVAILABLE = 2;
  PROXY_SOURCE_NODE_STATUS_UNAVAILABLE = 3;
}

enum ProxyRotationMode {
  PROXY_ROTATION_MODE_UNSPECIFIED = 0;
  PROXY_ROTATION_MODE_NONE = 1;
  PROXY_ROTATION_MODE_PER_REQUEST = 2;
  PROXY_ROTATION_MODE_STICKY_SESSION = 3;
  PROXY_ROTATION_MODE_SCHEDULED_POOL_REFRESH = 4;
}

enum ProxyRouteRuntimeKind {
  PROXY_ROUTE_RUNTIME_KIND_UNSPECIFIED = 0;
  PROXY_ROUTE_RUNTIME_KIND_GOST = 1;
}

enum ProxySourceRuntimeKind {
  PROXY_SOURCE_RUNTIME_KIND_UNSPECIFIED = 0;
  PROXY_SOURCE_RUNTIME_KIND_NONE = 1;
  PROXY_SOURCE_RUNTIME_KIND_MIHOMO = 2;
}

enum ProxyProviderAccountStatus {
  PROXY_PROVIDER_ACCOUNT_STATUS_UNSPECIFIED = 0;
  PROXY_PROVIDER_ACCOUNT_STATUS_ENABLED = 1;
  PROXY_PROVIDER_ACCOUNT_STATUS_DISABLED = 2;
}

enum ProxyDynamicLeaseStatus {
  PROXY_DYNAMIC_LEASE_STATUS_UNSPECIFIED = 0;
  PROXY_DYNAMIC_LEASE_STATUS_ACTIVE = 1;
  PROXY_DYNAMIC_LEASE_STATUS_EXPIRED = 2;
  PROXY_DYNAMIC_LEASE_STATUS_FAILED = 3;
  PROXY_DYNAMIC_LEASE_STATUS_RELEASED = 4;
}

enum ProxyIPNetworkKind {
  PROXY_IP_NETWORK_KIND_UNSPECIFIED = 0;
  PROXY_IP_NETWORK_KIND_UNKNOWN = 1;
  PROXY_IP_NETWORK_KIND_RESIDENTIAL = 2;
  PROXY_IP_NETWORK_KIND_DATACENTER = 3;
  PROXY_IP_NETWORK_KIND_MOBILE = 4;
  PROXY_IP_NETWORK_KIND_ISP = 5;
  PROXY_IP_NETWORK_KIND_BUSINESS = 6;
  PROXY_IP_NETWORK_KIND_SATELLITE = 7;
  PROXY_IP_NETWORK_KIND_BROADCAST = 8;
  PROXY_IP_NETWORK_KIND_ANYCAST = 9;
}

enum ProxyIPAnonymizerKind {
  PROXY_IP_ANONYMIZER_KIND_UNSPECIFIED = 0;
  PROXY_IP_ANONYMIZER_KIND_UNKNOWN = 1;
  PROXY_IP_ANONYMIZER_KIND_NONE = 2;
  PROXY_IP_ANONYMIZER_KIND_PROXY = 3;
  PROXY_IP_ANONYMIZER_KIND_VPN = 4;
  PROXY_IP_ANONYMIZER_KIND_TOR = 5;
  PROXY_IP_ANONYMIZER_KIND_CRAWLER = 6;
}

enum ProxyIPFraudRiskLevel {
  PROXY_IP_FRAUD_RISK_LEVEL_UNSPECIFIED = 0;
  PROXY_IP_FRAUD_RISK_LEVEL_UNKNOWN = 1;
  PROXY_IP_FRAUD_RISK_LEVEL_LOW = 2;
  PROXY_IP_FRAUD_RISK_LEVEL_MEDIUM = 3;
  PROXY_IP_FRAUD_RISK_LEVEL_HIGH = 4;
  PROXY_IP_FRAUD_RISK_LEVEL_CRITICAL = 5;
  PROXY_IP_FRAUD_RISK_LEVEL_UNSUPPORTED = 6;
}

enum ProxyIPFraudSignal {
  PROXY_IP_FRAUD_SIGNAL_UNSPECIFIED = 0;
  PROXY_IP_FRAUD_SIGNAL_BOGON = 1;
  PROXY_IP_FRAUD_SIGNAL_DATACENTER = 2;
  PROXY_IP_FRAUD_SIGNAL_HOSTING = 3;
  PROXY_IP_FRAUD_SIGNAL_PROXY = 4;
  PROXY_IP_FRAUD_SIGNAL_VPN = 5;
  PROXY_IP_FRAUD_SIGNAL_TOR = 6;
  PROXY_IP_FRAUD_SIGNAL_ABUSER = 7;
  PROXY_IP_FRAUD_SIGNAL_CRAWLER = 8;
  PROXY_IP_FRAUD_SIGNAL_MOBILE = 9;
  PROXY_IP_FRAUD_SIGNAL_SATELLITE = 10;
  PROXY_IP_FRAUD_SIGNAL_BROADCAST = 11;
  PROXY_IP_FRAUD_SIGNAL_ANYCAST = 12;
  PROXY_IP_FRAUD_SIGNAL_FRAUD_CHECK_UNSUPPORTED = 13;
}

enum ProxyIPFraudProviderKind {
  PROXY_IP_FRAUD_PROVIDER_KIND_UNSPECIFIED = 0;
  reserved 1;
  reserved "PROXY_IP_FRAUD_PROVIDER_KIND_FFRAUD";
  PROXY_IP_FRAUD_PROVIDER_KIND_IPAPI = 2;
  PROXY_IP_FRAUD_PROVIDER_KIND_IPINFO = 3;
  PROXY_IP_FRAUD_PROVIDER_KIND_IP2LOCATION = 4;
  PROXY_IP_FRAUD_PROVIDER_KIND_IP_API_COM = 5;
}

enum ProxyEdgeAccessRiskLevel {
  PROXY_EDGE_ACCESS_RISK_LEVEL_UNSPECIFIED = 0;
  PROXY_EDGE_ACCESS_RISK_LEVEL_UNKNOWN = 1;
  PROXY_EDGE_ACCESS_RISK_LEVEL_LOW = 2;
  PROXY_EDGE_ACCESS_RISK_LEVEL_MEDIUM = 3;
  PROXY_EDGE_ACCESS_RISK_LEVEL_HIGH = 4;
  PROXY_EDGE_ACCESS_RISK_LEVEL_CHALLENGE_LIKELY = 5;
  PROXY_EDGE_ACCESS_RISK_LEVEL_BLOCK_LIKELY = 6;
  PROXY_EDGE_ACCESS_RISK_LEVEL_UNSUPPORTED = 7;
}

enum ProxyEdgeAccessRiskSignal {
  PROXY_EDGE_ACCESS_RISK_SIGNAL_UNSPECIFIED = 0;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_IP_REPUTATION_RISK = 1;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_DATACENTER_NETWORK = 2;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_ANONYMIZER_DETECTED = 3;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_GEO_MISMATCH = 4;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_ACCESS_PASSED = 5;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_CHALLENGE_DETECTED = 6;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_BLOCK_DETECTED = 7;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_RATE_LIMIT_DETECTED = 8;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_UNAVAILABLE = 9;
  PROXY_EDGE_ACCESS_RISK_SIGNAL_EDGE_ACCESS_UNSUPPORTED = 10;
}

enum ProxySelectorStrategy {
  PROXY_SELECTOR_STRATEGY_UNSPECIFIED = 0;
  PROXY_SELECTOR_STRATEGY_ROUND_ROBIN = 1;
  PROXY_SELECTOR_STRATEGY_RANDOM = 2;
  PROXY_SELECTOR_STRATEGY_FIFO = 3;
  PROXY_SELECTOR_STRATEGY_HASH_CLIENT_IP = 4;
  PROXY_SELECTOR_STRATEGY_HASH_TARGET_HOST = 5;
}

enum ProxyChainStrategy {
  PROXY_CHAIN_STRATEGY_UNSPECIFIED = 0;
  PROXY_CHAIN_STRATEGY_REGION_AWARE = 1;
  PROXY_CHAIN_STRATEGY_LOWEST_LATENCY = 2;
  PROXY_CHAIN_STRATEGY_STABLE_HASH = 3;
}


enum ProxyChainHopRole {
  PROXY_CHAIN_HOP_ROLE_UNSPECIFIED = 0;
  PROXY_CHAIN_HOP_ROLE_LINE_PROXY = 1;
  PROXY_CHAIN_HOP_ROLE_DYNAMIC_GATEWAY = 2;
  PROXY_CHAIN_HOP_ROLE_DYNAMIC_EXIT = 3;
}

enum EgressHopRole {
  EGRESS_HOP_ROLE_UNSPECIFIED = 0;
  EGRESS_HOP_ROLE_FORWARD = 1;
  EGRESS_HOP_ROLE_EXIT = 2;
  EGRESS_HOP_ROLE_CONTROL_PLANE = 3;
}

enum EgressListenerKind {
  EGRESS_LISTENER_KIND_UNSPECIFIED = 0;
  EGRESS_LISTENER_KIND_DIRECT = 1;
  EGRESS_LISTENER_KIND_PROVIDER_ROUTE = 2;
  EGRESS_LISTENER_KIND_DYNAMIC_LEASE = 3;
}

message ProxySelectorPolicy {
  ProxySelectorStrategy strategy = 1;
  uint32 max_fails = 2;
  google.protobuf.Duration fail_timeout = 3;
}

message ProxyProviderDescriptor {
  string provider_id = 1;
  reserved 2;
  reserved "provider";
  string display_name = 3;
  repeated ProxyCapability capabilities = 4;
  repeated ProxyProtocol protocols = 5;
  google.protobuf.Duration min_sticky_ttl = 7;
  google.protobuf.Duration max_sticky_ttl = 8;
  repeated ProxyUpstreamKind upstream_kinds = 9;
  repeated ProxyRotationMode rotation_modes = 10;
}

message ProxyProviderAccount {
  reserved 6 to 12;
  reserved "proxy_addr", "protocol", "default_region", "default_state", "default_city", "default_asn", "default_sticky_ttl";

  string account_id = 1;
  string provider_id = 2;
  string display_name = 3;
  ProxyProviderAccountStatus status = 4;
  bool credential_configured = 5;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message ProxyFixedSourceDescriptor {
  uint32 endpoint_count = 1;
  repeated string region_codes = 2;
}

message ProxySubscriptionSourceDescriptor {
  string url_redacted = 1;
  google.protobuf.Duration interval = 2;
  string filter = 3;
  string exclude_filter = 4;
  string health_check_url = 5;
  google.protobuf.Duration health_interval = 6;
  google.protobuf.Duration health_timeout = 7;
  bool health_lazy = 8;
  uint32 expected_status = 9;
  repeated string region_codes = 10;
}

message ProxyAPIPoolSourceDescriptor {
  string provider_account_id = 1;
  uint32 endpoint_count = 2;
}

message ProxyDynamicIPSourceDescriptor {
  string provider_account_id = 1;
  bool requires_account_lease = 2;
  google.protobuf.Duration min_sticky_ttl = 3;
  google.protobuf.Duration max_sticky_ttl = 4;
}

message ProxySourceDescriptor {
  string source_id = 1;
  string provider_id = 2;
  string display_name = 3;
  ProxySourceKind kind = 4;
  bool enabled = 5;
  repeated ProxyCapability capabilities = 6;
  repeated ProxyProtocol protocols = 7;

  oneof model {
    ProxyFixedSourceDescriptor fixed_proxy = 10;
    ProxySubscriptionSourceDescriptor subscription = 11;
    ProxyAPIPoolSourceDescriptor api_pool = 12;
    ProxyDynamicIPSourceDescriptor dynamic_ip = 13;
  }
}

message ProxySourceNode {
  reserved 9;

  string source_id = 1;
  string node_id = 2;
  string display_name = 3;
  string node_type = 4;
  ProxySourceNodeStatus status = 5;
  uint32 delay_ms = 6;
  google.protobuf.Timestamp checked_at = 7;
  string error_message = 8;
}

message ProxyLineCandidate {
  reserved 10 to 13;

  string source_id = 1;
  string node_id = 2;
  string display_name = 3;
  ProxySourceKind source_kind = 4;
  ProxySourceNodeStatus status = 5;
  uint32 delay_ms = 6;
  repeated string region_codes = 7;
  uint32 priority = 8;
  string source_display_name = 9;
}

message ProxyDynamicGatewayCandidate {
  string provider_account_id = 1;
  string provider_id = 2;
  string gateway_id = 3;
  string display_name = 4;
  repeated string region_codes = 5;
  ProxyProtocol protocol = 6;
  uint32 priority = 7;
}

message ProxyChainHop {
  string hop_id = 1;
  uint32 order = 2;
  ProxyChainHopRole role = 3;
  ProxySourceKind source_kind = 4;
  string source_id = 5;
  string source_display_name = 6;
  string node_id = 7;
  string node_display_name = 8;
  string provider_account_id = 9;
  string provider_id = 10;
  string gateway_id = 11;
  string gateway_display_name = 12;
  string observed_ip = 13;
  string country_code = 14;
  string region = 15;
  string city = 16;
  ProxySourceNodeStatus status = 17;
  uint32 delay_ms = 18;
}

message ProxyChainPolicy {
  string country_code = 1;
  string region = 2;
  string purpose = 3;
  ProxyChainStrategy strategy = 4;
  uint32 max_attempts = 5;
  bool require_dynamic_exit = 6;
  bool allow_direct_dynamic_gateway = 7;
  bool prefer_line_proxy = 8;
}

message ProxyChainPlan {
  string chain_id = 1;
  ProxyChainPolicy policy = 2;
  ProxyLineCandidate line = 3;
  ProxyDynamicGatewayCandidate dynamic_gateway = 4;
  repeated string selection_reasons = 5;
  google.protobuf.Timestamp planned_at = 6;
  repeated ProxyChainHop hops = 7;
}

message ProviderControlPlaneAccess {
  bool uses_proxy = 1;
  string proxy_ref = 2;
  repeated ProxyProtocol protocols = 3;
}

message ProxySessionPolicy {
  ProxySessionMode mode = 1;
  string region = 2;
  string state = 3;
  string city = 4;
  string asn = 5;
  google.protobuf.Duration sticky_ttl = 6;
  map<string, string> labels = 7;
  ProxyUpstreamKind upstream_kind = 8;
  ProxyRotationMode rotation_mode = 9;
}

message ProxySession {
  string session_id = 1;
  reserved 2;
  reserved "provider";
  ProxySessionPolicy policy = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5;
  map<string, string> labels = 6;
  string provider_id = 7;
  ProxyEndpoint egress = 8;
  string account_id = 9;
  string purpose = 10;
}

message ProxyEndpoint {
  string id = 1;
  reserved 2;
  reserved "provider";
  ProxyProtocol protocol = 3;
  string host = 4;
  uint32 port = 5;
  string session_id = 6;
  ProxyUpstreamKind upstream_kind = 7;
  ProxyRotationMode rotation_mode = 8;
  map<string, string> labels = 9;
  string provider_id = 10;
}

message ProxyDynamicLease {
  string lease_id = 1;
  string account_id = 2;
  string purpose = 3;
  string provider_account_id = 4;
  ProxyDynamicLeaseStatus status = 5;
  ProxySession session = 6;
  ProxyEndpoint egress = 7;
  EgressListener listener = 8;
  ProxyIPFraudCheck ip_fraud_check = 9;
  ProxyEdgeAccessCheck edge_access_check = 10;
  google.protobuf.Timestamp acquired_at = 11;
  google.protobuf.Timestamp expires_at = 12;
  string error_message = 13;
  ProxyChainPlan chain_plan = 14;
}

message ProxyExitGeo {
  string ip = 1;
  string country_code = 2;
  google.protobuf.Timestamp checked_at = 3;
  string error_message = 4;
  string region = 5;
  string city = 6;
}

message ProxyExitIP {
  string ip = 1;
  google.protobuf.Timestamp checked_at = 2;
  string error_message = 3;
}

message ProxyTargetConnectivityCheck {
  string target_url = 1;
  string host = 2;
  bool reachable = 3;
  uint32 status_code = 4;
  uint32 latency_ms = 5;
  google.protobuf.Timestamp checked_at = 6;
  string error_message = 7;
}

message ProxyIPFraudCheck {
  string ip = 1;
  ProxyIPNetworkKind network_kind = 2;
  ProxyIPAnonymizerKind anonymizer_kind = 3;
  ProxyIPFraudRiskLevel risk_level = 4;
  double risk_score = 5;
  repeated ProxyIPFraudSignal risk_signals = 6;
  string country_code = 7;
  string region = 8;
  string city = 9;
  string asn = 10;
  string organization = 11;
  string isp = 12;
  google.protobuf.Timestamp checked_at = 13;
  string error_message = 14;
}

message ProxyEdgeAccessCheck {
  string ip = 1;
  ProxyEdgeAccessRiskLevel risk_level = 2;
  double risk_score = 3;
  repeated ProxyEdgeAccessRiskSignal risk_signals = 4;
  ProxyIPFraudCheck ip_fraud_check = 5;
  google.protobuf.Timestamp checked_at = 6;
  string error_message = 7;
}

message ProxyEdgeCanarySettings {
  string url = 1;
  string token = 2;
  bool clear_token = 3;
  bool enabled = 4;
}

message ProxyEdgeCanarySettingsView {
  string url = 1;
  bool token_configured = 2;
  bool enabled = 3;
}

message ProxyIPFraudProviderSettings {
  string provider_id = 1;
  uint32 weight = 2;
  ProxyIPFraudProviderKind kind = 3;
  reserved 4;
  reserved "url_template";
  bool anonymous = 5;
  repeated string api_keys = 6;
  bool clear_api_keys = 7;
}

message ProxyIPFraudProviderSettingsView {
  string provider_id = 1;
  uint32 weight = 2;
  ProxyIPFraudProviderKind kind = 3;
  reserved 4;
  reserved "url_template";
  bool anonymous = 5;
  bool api_key_configured = 6;
  uint32 api_key_count = 7;
}

message ProxyIPFraudProviderDescriptor {
  string provider_id = 1;
  uint32 default_weight = 2;
  ProxyIPFraudProviderKind kind = 3;
  bool supports_anonymous = 4;
  bool supports_api_key = 5;
  string display_name = 6;
}

message ProxyDynamicIPGatewaySettings {
  string gateway_id = 1;
  string display_name = 2;
  string addr = 3;
  repeated string region_codes = 4;
  repeated ProxyProtocol protocols = 5;
  ProxyProtocol default_protocol = 6;
}

message ProxyDynamicIPProviderSettings {
  string provider_id = 1;
  repeated ProxyDynamicIPGatewaySettings gateways = 2;
}

message ProxyRuntimeSettings {
  ProxyEdgeCanarySettingsView edge_canary = 1;
  repeated ProxyIPFraudProviderSettingsView ip_fraud_providers = 2;
  repeated ProxyDynamicIPProviderSettings dynamic_ip_providers = 3;
}

message ProxyRuntimePersistentSettings {
  ProxyEdgeCanarySettings edge_canary = 1;
  repeated ProxyIPFraudProviderSettings ip_fraud_providers = 2;
  repeated ProxyDynamicIPProviderSettings dynamic_ip_providers = 3;
}

message ProxyRuntimeOverview {
  ProxyRouteRuntimeKind route_runtime = 1;
  string route_runtime_status = 2;
  uint32 provider_account_count = 3;
  uint32 source_count = 4;
  uint32 active_lease_count = 5;
  google.protobuf.Timestamp updated_at = 6;
  ProxySourceRuntimeKind source_runtime = 7;
  string source_runtime_status = 8;
}

message ProxyPoolSnapshot {
  string pool_id = 1;
  ProxyProviderDescriptor provider_descriptor = 2;
  repeated ProxyEndpoint endpoints = 4;
  google.protobuf.Timestamp refreshed_at = 5;
  repeated ProxySourceDescriptor sources = 6;
  repeated ProxyDynamicLease dynamic_leases = 7;
}

message EgressListener {
  string listener_id = 1;
  EgressListenerKind kind = 2;
  string listen_addr = 3;
  ProxyProtocol protocol = 4;
  string route_id = 5;
  bool managed = 6;
  map<string, string> labels = 7;
}

message EgressHop {
  string hop_id = 1;
  uint32 order = 2;
  EgressHopRole role = 3;
  ProxySelectorPolicy selector = 4;
  repeated ProxyEndpoint endpoints = 5;
}

message EgressRoute {
  string route_id = 1;
  repeated EgressHop hops = 2;
}

message EgressGateway {
  string gateway_id = 1;
  repeated EgressListener listeners = 2;
  ProxyPoolSnapshot pool = 4;
  EgressRoute data_plane_route = 5;
  EgressRoute control_plane_route = 6;
  ProviderControlPlaneAccess provider_control_plane = 7;
  google.protobuf.Timestamp updated_at = 8;
  ProxyRuntimeOverview overview = 9;
}

message ListProxyProvidersRequest {}
message ListProxyProvidersResponse { repeated ProxyProviderDescriptor providers = 1; }
message GetEgressGatewayRequest { string gateway_id = 1; }
message GetEgressGatewayResponse { EgressGateway gateway = 1; }
message GetProxyPoolRequest { string pool_id = 1; }
message GetProxyPoolResponse { ProxyPoolSnapshot pool = 1; }
message RefreshProxyPoolRequest { string pool_id = 1; }
message RefreshProxyPoolResponse { ProxyPoolSnapshot pool = 1; }

message ListProxyProviderAccountsRequest {}
message ListProxyProviderAccountsResponse { repeated ProxyProviderAccount accounts = 1; }
message UpsertProxyProviderAccountRequest {
  reserved 5 to 11;
  reserved "proxy_addr", "protocol", "default_region", "default_state", "default_city", "default_asn", "default_sticky_ttl";

  string account_id = 1;
  string provider_id = 2;
  string display_name = 3;
  bool enabled = 4;
  string username = 12;
  string password = 13;
  bool clear_password = 14;
}
message UpsertProxyProviderAccountResponse { ProxyProviderAccount account = 1; }
message DeleteProxyProviderAccountRequest { string account_id = 1; }
message DeleteProxyProviderAccountResponse {}

message ListProxySourcesRequest {}
message ListProxySourcesResponse { repeated ProxySourceDescriptor sources = 1; }
message UpsertProxySubscriptionSourceRequest {
  string source_id = 1;
  string display_name = 2;
  bool enabled = 3;
  string url = 4;
  bool clear_url = 5;
  google.protobuf.Duration interval = 6;
  string filter = 7;
  string exclude_filter = 8;
  string health_check_url = 9;
  google.protobuf.Duration health_interval = 10;
  google.protobuf.Duration health_timeout = 11;
  bool health_lazy = 12;
  uint32 expected_status = 13;
  repeated string region_codes = 14;
}
message UpsertProxySubscriptionSourceResponse { ProxySourceDescriptor source = 1; }
message UpsertProxyFixedSourceRequest {
  string source_id = 1;
  string display_name = 2;
  bool enabled = 3;
  string uri = 4;
  bool clear_uri = 5;
  repeated string region_codes = 6;
}
message UpsertProxyFixedSourceResponse { ProxySourceDescriptor source = 1; }
message DeleteProxySourceRequest { string source_id = 1; }
message DeleteProxySourceResponse {}
message ListProxySourceNodesRequest { string source_id = 1; }
message ListProxySourceNodesResponse { repeated ProxySourceNode nodes = 1; }

message ResolveProxyChainRequest {
  reserved 2;
  reserved "provider_account_id";

  string account_id = 1;
  ProxySessionPolicy session_policy = 3;
  ProxyChainPolicy chain_policy = 4;
}
message ResolveProxyChainResponse {
  ProxyChainPlan plan = 1;
  repeated ProxyLineCandidate line_candidates = 2;
  repeated ProxyDynamicGatewayCandidate dynamic_gateway_candidates = 3;
}

message ListProxyDynamicLeasesRequest {}
message ListProxyDynamicLeasesResponse { repeated ProxyDynamicLease leases = 1; }
message AcquireProxyLeaseRequest {
  reserved 3;
  reserved "provider_account_id";

  string account_id = 1;
  string purpose = 2;
  ProxySessionPolicy policy = 4;
  bool force_new = 5;
  ProxyChainPolicy chain_policy = 6;
}
message AcquireProxyLeaseResponse {
  ProxyDynamicLease lease = 1;
  ProxyPoolSnapshot pool = 2;
  ProxyEndpoint egress = 3;
  ProxyChainPlan chain_plan = 4;
}
message ReleaseProxyLeaseRequest { string account_id = 1; }
message ReleaseProxyLeaseResponse { ProxyDynamicLease lease = 1; }

message GetProxyExitIPRequest {
  string pool_id = 1;
  string provider_id = 2;
  string listener_id = 3;
}
message GetProxyExitIPResponse { ProxyExitIP proxy_exit_ip = 1; }

message GetProxyExitGeoRequest {
  reserved 1, 2, 3;
  reserved "pool_id", "provider_id", "listener_id";
  string ip = 4;
}
message GetProxyExitGeoResponse { ProxyExitGeo proxy_exit_geo = 1; }
message CheckProxyIPFraudRequest {
  reserved 1, 2, 3;
  reserved "pool_id", "provider_id", "listener_id";
  string ip = 4;
}
message CheckProxyIPFraudResponse { ProxyIPFraudCheck check = 1; }
message CheckProxyEdgeAccessRequest {
  string pool_id = 1;
  string provider_id = 2;
  string listener_id = 3;
  string expected_country_code = 4;
  string ip = 5;
}
message CheckProxyEdgeAccessResponse { ProxyEdgeAccessCheck check = 1; }
message CheckProxyTargetConnectivityRequest {
  string pool_id = 1;
  string provider_id = 2;
  string listener_id = 3;
  string target_url = 4;
}
message CheckProxyTargetConnectivityResponse { ProxyTargetConnectivityCheck check = 1; }

message GetProxyRuntimeSettingsRequest {}
