  rpc UpsertProxyFixedSource(UpsertProxyFixedSourceRequest) returns (UpsertProxyFixedSourceResponse);
  rpc DeleteProxySource(DeleteProxySourceRequest) returns (DeleteProxySourceResponse);
  rpc ListProxySourceNodes(ListProxySourceNodesRequest) returns (ListProxySourceNodesResponse);
  rpc ResolveProxyChain(ResolveProxyChainRequest) returns (ResolveProxyChainResponse);
  rpc ListProxyDynamicLeases(ListProxyDynamicLeasesRequest) returns (ListProxyDynamicLeasesResponse);
  rpc AcquireProxyLease(AcquireProxyLeaseRequest) returns (AcquireProxyLeaseResponse);
