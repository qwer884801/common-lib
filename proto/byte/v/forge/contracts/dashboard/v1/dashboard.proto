syntax = "proto3";

package byte.v.forge.contracts.dashboard.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.Contracts.Dashboard.V1";
option go_package = "github.com/byte-v-forge/common-lib/gen/go/byte/v/forge/contracts/dashboard/v1;dashboardv1";
option java_multiple_files = true;
option java_outer_classname = "DashboardProto";
option java_package = "com.bytevforge.contracts.dashboard.v1";
option php_namespace = "ByteVForge\\Contracts\\Dashboard\\V1";

enum DashboardNavSection {
  DASHBOARD_NAV_SECTION_UNSPECIFIED = 0;
  DASHBOARD_NAV_SECTION_MAIN = 1;
  DASHBOARD_NAV_SECTION_LAB = 2;
  DASHBOARD_NAV_SECTION_INFRASTRUCTURE = 3;
}

message DashboardModuleManifest {
  string id = 1;
  repeated DashboardNavEntry nav = 2;
}

message DashboardNavEntry {
  string key = 1;
  string label = 2;
  string icon = 3;
  DashboardNavSection section = 4;
  repeated string required_services = 5;
  int32 order = 6;
}

enum DashboardServiceStatusState {
  DASHBOARD_SERVICE_STATUS_STATE_UNSPECIFIED = 0;
  DASHBOARD_SERVICE_AVAILABLE = 1;
  DASHBOARD_SERVICE_UNAVAILABLE = 2;
  DASHBOARD_SERVICE_UNKNOWN = 3;
}

message DashboardServiceStatus {
  string name = 1;
  DashboardServiceStatusState status = 2;
  string message = 3;
  google.protobuf.Timestamp checked_at = 4;
}

message DashboardServiceStatusResponse {
  repeated DashboardServiceStatus services = 1;
}
