syntax = "proto3";

package byte.v.forge.contracts.common.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.Contracts.Common.V1";
option go_package = "github.com/byte-v-forge/common-lib/gen/go/byte/v/forge/contracts/common/v1;commonv1";
option java_multiple_files = true;
option java_outer_classname = "CommonProto";
option java_package = "com.bytevforge.contracts.common.v1";
option php_namespace = "ByteVForge\\Contracts\\Common\\V1";

message EventMetadata {
  string id = 1;
  string type = 2;
  string version = 3;
  google.protobuf.Timestamp time = 4;
  string source = 5;
  string correlation_id = 6;
  string trace_id = 7;
  string idempotency_key = 8;
  string subject = 9;
  string spec_version = 10;
  string data_content_type = 11;
  string data_schema = 12;
}

message SecretRef {
  string secret_id = 1;
  string provider = 2;
  string purpose = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message ArtifactRef {
  string artifact_id = 1;
  string uri = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string purpose = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message OperationError {
  string code = 1;
  string message = 2;
  bool retryable = 3;
  google.protobuf.Timestamp retry_after = 4;
}
